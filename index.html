<!DOCTYPE html>
<html>
<head>
  <title>Snake Game + Admin Panel</title>
  <style>
    body { font-family: Arial; display: flex; }
    canvas { border: 2px solid black; }
    #admin {
      margin-left: 20px;
      padding: 10px;
      border: 2px solid #444;
      width: 200px;
    }
    input, button { margin: 5px 0; width: 100%; }
  </style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>
<div id="admin">
  <h3>Admin Panel</h3>
  <label>Speed</label>
  <input type="range" min="50" max="300" value="150" id="speed">
  <label>Grid Size</label>
  <input type="number" id="gridSize" value="20">
  <button onclick="toggleWalls()">Toggle Walls</button>
  <button onclick="growSnake()">Grow Snake</button>
  <button onclick="shrinkSnake()">Shrink Snake</button>
  <button onclick="addScore()">+10 Score</button>
  <button onclick="teleport()">Teleport Snake</button>
  <button onclick="resetGame()">Reset</button>
</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let gridSize = 20;
let tileCount = canvas.width / gridSize;
let snake = [{x: 10, y: 10}];
let dx = 1;
let dy = 0;
let food = {x: 5, y: 5};
let score = 0;
let speed = 150;
let walls = true;
function gameLoop() {
  setTimeout(() => {
    update();
    draw();
    gameLoop();
  }, speed);
}
function update() {
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};
  if (!walls) {
    head.x = (head.x + tileCount) % tileCount;
    head.y = (head.y + tileCount) % tileCount;
  }
  if (walls &&
    (head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount)) {
    resetGame();
    return;
  }
  for (let part of snake) {
    if (part.x === head.x && part.y === head.y) {
      resetGame();
      return;
    }
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    spawnFood();
  } else {
    snake.pop();
  }
}
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "lime";
  snake.forEach(part => {
    ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize-2, gridSize-2);
  });
  ctx.fillStyle = "red";
  ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize-2, gridSize-2);
  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 10, 20);
}
function spawnFood() {
  food = {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
}
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
  if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
  if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
  if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
});
/* ADMIN PANEL FUNCTIONS */
document.getElementById("speed").oninput = function() {
  speed = this.value;
};
document.getElementById("gridSize").onchange = function() {
  gridSize = parseInt(this.value);
  tileCount = canvas.width / gridSize;
};
function toggleWalls() {
  walls = !walls;
}
function growSnake() {
  snake.push({...snake[snake.length - 1]});
}
function shrinkSnake() {
  if (snake.length > 1) snake.pop();
}
function addScore() {
  score += 10;
}
function teleport() {
  snake[0].x = Math.floor(Math.random() * tileCount);
  snake[0].y = Math.floor(Math.random() * tileCount);
}
function resetGame() {
  snake = [{x: 10, y: 10}];
  dx = 1;
  dy = 0;
  score = 0;
  spawnFood();
}
gameLoop();
</script>
</body>
</html>
